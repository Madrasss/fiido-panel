<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0b0d0f">
<title>Fiido Air · Panel</title>
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@300;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0b0d0f; --panel:#14171a; --ink:#f2f5f2; --dim:#8a9196;
    --line:#23282c; --viz:#d7f24b; --viz-dim:#5f6b22; --warn:#ff8a4a; --err:#ff5a5a;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{
    background:var(--bg); color:var(--ink);
    font-family:'Chakra Petch',-apple-system,system-ui,sans-serif;
    display:flex; flex-direction:column; gap:10px;
    padding:calc(env(safe-area-inset-top) + 10px) 14px calc(env(safe-area-inset-bottom) + 12px);
    user-select:none;-webkit-user-select:none; overflow-y:auto;
  }
  .mono{font-family:'IBM Plex Mono',monospace}

  /* pasek statusu */
  .status{display:flex;justify-content:space-between;align-items:center;
    font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.1em;
    color:var(--dim);text-transform:uppercase}
  #blename{color:var(--viz)}
  .status .off{color:var(--line)}

  /* prędkość */
  .speed{display:flex;flex-direction:column;align-items:center;padding:6px 0 2px}
  #spd{font-weight:600;font-size:clamp(80px,30vw,150px);line-height:.95;
    letter-spacing:-.03em;font-variant-numeric:tabular-nums;color:var(--dim);transition:color .4s}
  #spd.on{color:var(--viz)}
  .unit{font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.35em;color:var(--dim)}

  /* bateria */
  .batt{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:12px 16px}
  .batt .row{display:flex;justify-content:space-between;align-items:baseline}
  .batt .soc{font-size:34px;font-weight:600;font-variant-numeric:tabular-nums}
  .batt .soc small{font-size:15px;color:var(--dim);font-weight:300}
  .batt .det{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--dim)}
  .bar{height:8px;border-radius:4px;background:var(--line);margin-top:9px;overflow:hidden}
  .bar i{display:block;height:100%;width:0%;background:var(--viz);border-radius:4px;transition:width .6s}
  .bar i.low{background:var(--warn)} .bar i.crit{background:var(--err)}

  /* metryki */
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--line);
    border:1px solid var(--line);border-radius:14px;overflow:hidden}
  .cell{background:var(--panel);padding:10px 14px 9px}
  .lbl{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.16em;
    color:var(--dim);text-transform:uppercase;margin-bottom:2px}
  .val{font-size:22px;font-weight:500;font-variant-numeric:tabular-nums}
  .val small{font-size:12px;color:var(--dim);font-weight:300;margin-left:2px}

  /* wspomaganie */
  .sect{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.2em;
    color:var(--dim);text-transform:uppercase;margin:2px 2px -4px}
  .gears{display:flex;gap:8px}
  .gear{flex:1;background:var(--panel);border:1px solid var(--line);border-radius:12px;
    padding:14px 0;text-align:center;font-family:'Chakra Petch',sans-serif;font-weight:600;
    font-size:15px;color:var(--dim);text-transform:uppercase;letter-spacing:.05em;
    transition:all .2s;cursor:pointer}
  .gear:active{transform:scale(.96)}
  .gear.cur{background:var(--viz);color:#111;border-color:var(--viz)}
  .gear:disabled{opacity:.35}

  /* przełączniki */
  .toggles{display:flex;gap:8px}
  .tgl{flex:1;background:var(--panel);border:1px solid var(--line);border-radius:12px;
    padding:13px 0;text-align:center;font-family:'Chakra Petch',sans-serif;font-weight:600;
    font-size:14px;color:var(--dim);text-transform:uppercase;letter-spacing:.06em;
    transition:all .2s;cursor:pointer}
  .tgl:active{transform:scale(.96)}
  .tgl.on{color:var(--viz);border-color:var(--viz-dim)}
  .tgl:disabled{opacity:.35}

  /* połączenie */
  .conn{display:flex;gap:8px}
  button.big{flex:1;border:none;border-radius:14px;padding:16px 0;cursor:pointer;
    font-family:'Chakra Petch',sans-serif;font-weight:600;font-size:16px;
    letter-spacing:.08em;text-transform:uppercase;transition:transform .08s}
  button.big:active{transform:scale(.97)}
  #btnConn{background:var(--viz);color:#111}
  #btnConn.connected{background:var(--panel);color:var(--err);border:1px solid var(--line)}
  #btnScanAll{flex:.6;background:var(--panel);color:var(--dim);border:1px solid var(--line);font-size:12px}

  #msg{text-align:center;font-family:'IBM Plex Mono',monospace;font-size:11px;
    color:var(--warn);min-height:15px;letter-spacing:.04em}

  /* log diagnostyczny */
  details{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:8px 12px}
  summary{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.14em;
    color:var(--dim);text-transform:uppercase;cursor:pointer}
  #log{font-family:'IBM Plex Mono',monospace;font-size:10px;line-height:1.5;color:var(--dim);
    max-height:180px;overflow-y:auto;margin-top:8px;white-space:pre-wrap;word-break:break-all}
  #log .tx{color:var(--viz-dim)} #log .rx{color:var(--dim)} #log .ev{color:var(--viz)} #log .er{color:var(--err)}
  @media (prefers-reduced-motion: reduce){ *{transition:none!important} }
</style>
</head>
<body>

<div class="status">
  <span id="blename" class="off">Rozłączony</span>
  <span id="motorstat" class="off">ZASILANIE —</span>
  <span id="wake" class="off">EKRAN ⏻</span>
</div>

<div class="speed">
  <div id="spd">—</div>
  <div class="unit">km / h</div>
</div>

<div class="batt">
  <div class="row">
    <span class="soc"><span id="soc">—</span><small> %</small></span>
    <span class="det"><span id="volt">—</span> V · <span id="amp">—</span> A · <span id="watt">—</span> W</span>
  </div>
  <div class="bar"><i id="socbar"></i></div>
</div>

<div class="grid">
  <div class="cell"><div class="lbl">Trip</div><div class="val"><span id="trip">—</span><small>km</small></div></div>
  <div class="cell"><div class="lbl">Łącznie</div><div class="val"><span id="total">—</span><small>km</small></div></div>
  <div class="cell"><div class="lbl">Moment korby</div><div class="val"><span id="torq">—</span><small>Nm</small></div></div>
  <div class="cell"><div class="lbl">Kadencja</div><div class="val"><span id="rpm">—</span><small>rpm</small></div></div>
  <div class="cell"><div class="lbl">Temp. silnika</div><div class="val"><span id="mtemp">—</span><small>°C</small></div></div>
  <div class="cell"><div class="lbl">Energia trip</div><div class="val"><span id="twh">—</span><small>Wh</small></div></div>
</div>

<div class="sect">Wspomaganie</div>
<div class="gears" id="gears"></div>

<div class="sect">Sterowanie</div>
<div class="toggles">
  <button class="tgl" id="tglPower">Zasilanie</button>
  <button class="tgl" id="tglLight">Światło</button>
  <button class="tgl" id="tglHorn">Klakson</button>
</div>

<div class="conn">
  <button class="big" id="btnConn">Połącz z rowerem</button>
  <button class="big" id="btnScanAll">Skanuj<br>wszystko</button>
</div>
<div id="msg"></div>

<details>
  <summary>Diagnostyka / surowe ramki</summary>
  <div id="log"></div>
</details>

<script>
(() => {
  'use strict';
  const $ = id => document.getElementById(id);
  const SVC  = '00010203-0405-0607-0809-0a0b0c0dffe0';
  const CH_RX = '00010203-0405-0607-0809-0a0b0c0dffe1'; // NOTIFY
  const CH_TX = '00010203-0405-0607-0809-0a0b0c0dffe2'; // WRITE

  // ── protokół Fiido BMS (za esphome-fiido-bms, zweryfikowany na C11 Pro / M1 Pro) ──
  const SIG0=0x46, SIG1=0x64, T_POLL=0x55, T_NOTIFY=0xAA, T_WRITE=0xAA;
  const POLLS = [
    {addr:0x05, len:53, name:'STATS',   every:1},
    {addr:0x7B, len:13, name:'BATTERY', every:3},
    {addr:0xC8, len:12, name:'ENERGY',  every:3},
    {addr:0x96, len:12, name:'MOTOR',   every:9},
  ];
  const GEARS_3 = ['OFF','eco','sport','turbo'];
  const GEARS_5 = ['OFF','eco','normal','sport','turbo','turbo+'];

  const crc = (b, n) => { let c=0; for(let i=0;i<n;i++) c^=b[i]; return c; };
  const u16 = (p,o) => (p[o]<<8)|p[o+1];
  const u32 = (p,o) => ((p[o]<<24)>>>0)+(p[o+1]<<16)+(p[o+2]<<8)+p[o+3];
  const hex = a => [...a].map(x=>x.toString(16).padStart(2,'0')).join(' ');

  function pollFrame(addr, len){
    const f = new Uint8Array(6);
    f[0]=SIG0; f[1]=SIG1; f[2]=T_POLL; f[3]=len; f[4]=addr; f[5]=crc(f,5);
    return f;
  }
  function writeFrame(addr, payload){
    const f = new Uint8Array(6+payload.length);
    f[0]=SIG0; f[1]=SIG1; f[2]=T_WRITE; f[3]=payload.length; f[4]=addr;
    f.set(payload,5); f[5+payload.length]=crc(f,5+payload.length);
    return f;
  }

  // ── stan ──
  let device=null, txChar=null, rxBuf=new Uint8Array(0);
  let pollTimer=null, tick=0, wakeLock=null, connectedAt=0;
  let motorOn=false, lightOn=false, hornOn=true, gear=-1, gearCount=3;
  let a27=null, a38=null;           // cache bajtów flag do RMW
  let socLow=false;

  function log(cls, txt){
    const el=$('log'); const d=new Date();
    const t=`${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}:${String(d.getSeconds()).padStart(2,'0')}.${String(d.getMilliseconds()).padStart(3,'0')}`;
    el.innerHTML += `<span class="${cls}">[${t}] ${txt}</span>\n`;
    while(el.childNodes.length>120) el.removeChild(el.firstChild);
    el.scrollTop=el.scrollHeight;
  }
  const msg = t => $('msg').textContent = t;

  // ── UI ──
  function buildGears(){
    const box=$('gears'); box.innerHTML='';
    const names = gearCount===5 ? GEARS_5 : GEARS_3;
    names.forEach((n,i)=>{
      const b=document.createElement('button');
      b.className='gear'+(i===gear?' cur':''); b.textContent=n;
      b.disabled = !txChar || !motorOn;
      b.onclick = () => setGear(i);
      box.appendChild(b);
    });
  }
  function renderControls(){
    $('motorstat').textContent = 'ZASILANIE ' + (motorOn?'ON':'OFF');
    $('motorstat').classList.toggle('off', !motorOn);
    $('tglPower').classList.toggle('on', motorOn);
    $('tglLight').classList.toggle('on', lightOn);
    $('tglHorn').classList.toggle('on', hornOn);
    const dis = !txChar;
    $('tglPower').disabled = dis || a27===null;
    $('tglLight').disabled = dis || a27===null || !motorOn;
    $('tglHorn').disabled  = dis || a38===null;
    buildGears();
  }

  // ── parsowanie ──
  function onNotify(ev){
    const chunk = new Uint8Array(ev.target.value.buffer);
    const merged = new Uint8Array(rxBuf.length + chunk.length);
    merged.set(rxBuf); merged.set(chunk, rxBuf.length);
    rxBuf = merged;
    // wyszukuj kompletne ramki 46 64 AA len addr ... crc
    for(;;){
      let s=0;
      while(s+1 < rxBuf.length && !(rxBuf[s]===SIG0 && rxBuf[s+1]===SIG1)) s++;
      if(s>0) rxBuf = rxBuf.slice(s);
      if(rxBuf.length < 6) return;
      const flen = 6 + rxBuf[3];
      if(rxBuf.length < flen) return;
      const fr = rxBuf.slice(0, flen);
      rxBuf = rxBuf.slice(flen);
      if(fr[2]!==T_NOTIFY){ log('er','pominięto typ 0x'+fr[2].toString(16)); continue; }
      if(fr[flen-1]!==crc(fr,flen-1)){ log('er','CRC błędne: '+hex(fr)); continue; }
      const addr=fr[4], p=fr.slice(5,flen-1);
      log('rx',`RX ${addr.toString(16).padStart(2,'0')} (${p.length}B): ${hex(p)}`);
      parse(addr, p);
    }
  }

  function parse(addr, p){
    if(addr===0x05 && p.length===53){                 // STATS
      $('total').textContent=(u32(p,23)/10).toFixed(1);
      $('trip').textContent =(u16(p,27)/10).toFixed(1);
      const kmh=u16(p,29)/10;
      $('spd').textContent = kmh.toFixed(1);
      $('spd').classList.toggle('on', kmh>0.5);
      setSoc(p[31]);
      // biegi
      const r25=p[32], hi=(r25>>4)&15, lo=r25&15, mg=Math.max(hi,lo);
      if(mg===3||mg===5) gearCount=mg;
      gear = p[33];
      a27 = p[34]; a38 = p[51];
      motorOn = (a27 & 0x80)!==0;
      lightOn = motorOn && (a27 & 0x08)!==0;
      hornOn  = (a38 & 0x0C)===0;   // bity 3:2 == 00 → słyszalny
      renderControls();
    } else if(addr===0x7B && p.length===13){          // BATTERY
      const v=u16(p,4)/10, i=u16(p,9)/10;
      $('volt').textContent=v.toFixed(1);
      $('amp').textContent=i.toFixed(1);
      $('watt').textContent=Math.round(v*i);
    } else if(addr===0xC8 && p.length===12){          // ENERGY
      $('torq').textContent=(u16(p,0)/10).toFixed(1);
      $('rpm').textContent=u16(p,2);
      $('twh').textContent=(u16(p,4)/10).toFixed(0);
    } else if(addr===0x96 && p.length===12){          // MOTOR
      let t=u16(p,7); if(t>32767) t-=65536;
      $('mtemp').textContent=t;
    }
  }

  function setSoc(s){
    $('soc').textContent=s;
    const bar=$('socbar');
    bar.style.width=s+'%';
    bar.className = s<=10?'crit': s<=25?'low':'';
    if(s<=15 && !socLow){ socLow=true; msg('Niski poziom baterii: '+s+'%'); }
    if(s>20) socLow=false;
  }

  // ── zapis ──
  async function tx(frame, label){
    if(!txChar) return;
    try{
      log('tx',`TX ${label}: ${hex(frame)}`);
      if(txChar.properties.writeWithoutResponse) await txChar.writeValueWithoutResponse(frame);
      else await txChar.writeValue(frame);
    }catch(e){ log('er','TX błąd: '+e.message); }
  }
  async function setGear(g){
    if(!motorOn){ msg('Włącz zasilanie roweru, aby zmienić bieg'); return; }
    await tx(writeFrame(0x26, [g]), 'GEAR='+g);
  }
  $('tglPower').onclick = async () => {
    if(a27===null) return;
    let b = motorOn ? (a27 & ~0x80 & ~0x08) : (a27 | 0x80);
    await tx(writeFrame(0x27, [b & 0xFF]), 'POWER');
  };
  $('tglLight').onclick = async () => {
    if(a27===null || !motorOn) return;
    let b = lightOn ? (a27 & ~0x08) : (a27 | 0x08);
    await tx(writeFrame(0x27, [b & 0xFF]), 'LIGHT');
  };
  $('tglHorn').onclick = async () => {
    if(a38===null) return;
    let b = a38 & ~0x0C; if(hornOn) b |= 0x04;   // 00=słyszalny, 01=wyciszony
    await tx(writeFrame(0x38, [b & 0xFF]), 'HORN');
  };

  // ── pętla odpytywania ──
  function startPolling(){
    stopPolling(); tick=0;
    pollTimer = setInterval(async () => {
      tick++;
      for(const p of POLLS){
        if(tick % p.every === 0){ await tx(pollFrame(p.addr, p.len), 'POLL '+p.name); }
      }
    }, 1000);
  }
  function stopPolling(){ if(pollTimer){ clearInterval(pollTimer); pollTimer=null; } }

  // ── połączenie ──
  async function connect(scanAll){
    if(device){ await disconnect(); return; }
    if(!navigator.bluetooth){ msg('Brak Web Bluetooth — otwórz w przeglądarce Bluefy'); return; }
    try{
      msg('Skanowanie…');
      const opts = scanAll
        ? { acceptAllDevices:true, optionalServices:[SVC] }
        : { filters:[{namePrefix:'Fiido'}], optionalServices:[SVC] };
      device = await navigator.bluetooth.requestDevice(opts);
      log('ev','Wybrano: '+(device.name||'(bez nazwy)'));
      device.addEventListener('gattserverdisconnected', onDisconnected);
      msg('Łączenie…');
      const gatt = await device.gatt.connect();
      connectedAt = performance.now();
      log('ev','KROK 1: GATT połączony');
      // ── ZWIAD: pełna mapa usług zanim czegokolwiek dotkniemy ──
      try{
        const all = await gatt.getPrimaryServices();
        log('ev','KROK 2: usługi ('+all.length+'):');
        for(const s of all){
          let line = '  SVC '+s.uuid;
          try{
            const chars = await s.getCharacteristics();
            for(const c of chars){
              const pr=c.properties, fl=[];
              if(pr.read)fl.push('R'); if(pr.write)fl.push('W');
              if(pr.writeWithoutResponse)fl.push('WNR');
              if(pr.notify)fl.push('N'); if(pr.indicate)fl.push('I');
              line += '\n    CHR '+c.uuid+' ['+fl.join(',')+']';
            }
          }catch(e){ line += ' (chars: '+e.message+')'; }
          log('rx', line);
        }
      }catch(e){ log('er','KROK 2: enumeracja nieudana: '+e.message); }
      const svc  = await gatt.getPrimaryService(SVC);
      log('ev','KROK 3: usługa FFE0 znaleziona');
      const rx   = await svc.getCharacteristic(CH_RX);
      txChar     = await svc.getCharacteristic(CH_TX);
      log('ev','KROK 4: FFE1/FFE2 OK, włączam notyfikacje…');
      await rx.startNotifications();
      rx.addEventListener('characteristicvaluechanged', onNotify);
      log('ev','KROK 5: notyfikacje włączone');
      $('blename').textContent = device.name || 'Połączono';
      $('blename').classList.remove('off');
      $('btnConn').textContent='Rozłącz'; $('btnConn').classList.add('connected');
      msg('');
      log('ev','KROK 6: start pollingu za 2 s…');
      setTimeout(()=>{ if(device){ startPolling(); log('ev','KROK 7: polling wystartował'); } }, 2000);
      acquireWake(); renderControls();
    }catch(e){
      log('er', e.message); 
      msg(e.name==='NotFoundError' ? 'Nie wybrano urządzenia' : 'Błąd: '+e.message);
      await disconnect(true);
    }
  }
  function onDisconnected(){
    const dt = connectedAt ? Math.round(performance.now()-connectedAt) : -1;
    log('er','ROZŁĄCZONO przez urządzenie po '+dt+' ms od połączenia');
    msg('Rozłączono po '+dt+' ms — zrób zrzut logu diagnostycznego');
    disconnect(true);
  }
  async function disconnect(silent){
    stopPolling();
    try{ if(device && device.gatt.connected) device.gatt.disconnect(); }catch(_){}
    device=null; txChar=null; a27=null; a38=null; motorOn=false; rxBuf=new Uint8Array(0);
    $('blename').textContent='Rozłączony'; $('blename').classList.add('off');
    $('btnConn').textContent='Połącz z rowerem'; $('btnConn').classList.remove('connected');
    if(wakeLock){ try{wakeLock.release();}catch(_){} wakeLock=null; }
    $('wake').classList.add('off');
    renderControls();
    if(!silent) msg('');
  }

  async function acquireWake(){
    try{
      if('wakeLock' in navigator){
        wakeLock = await navigator.wakeLock.request('screen');
        $('wake').classList.remove('off');
        wakeLock.addEventListener('release', ()=>$('wake').classList.add('off'));
      } else msg('Wake Lock niedostępny — ustaw Blokadę automatyczną na Nigdy');
    }catch(_){}
  }
  document.addEventListener('visibilitychange', ()=>{
    if(document.visibilityState==='visible' && device) acquireWake();
  });

  $('btnConn').onclick   = () => connect(false);
  $('btnScanAll').onclick= () => connect(true);
  buildGears(); renderControls();
})();
</script>
</body>
</html>
